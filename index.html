<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Wedding To-Do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #3D0A1A; --navy-light: #5C1020;
    --ivory: #F5EDE0; --ivory-dark: #EDE0CE;
    --rose: #7A2040; --rose-dark: #5C1020;
    --gold: #D4BC8A; --slate: #C4A0A8;
    --green: #6A9E7A; --amber: #B8860B;
    --text: #3D0A1A; --text-muted: #8B5A65;
    --surface: #FFFFFF; --border: #E0CECE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--ivory); color: var(--text); min-height: 100vh; }

  /* HERO */
  .hero { background: var(--navy); color: white; padding: 24px 20px 20px; text-align: center; position: relative; z-index: 100; box-shadow: 0 2px 12px rgba(61,10,26,0.4); }
  .hero-eyebrow { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--slate); margin-bottom: 4px; }
  .hero-title { font-family: 'Cormorant Garant', serif; font-size: 24px; font-weight: 600; color: var(--ivory); margin-bottom: 14px; }
  .countdown { display: flex; justify-content: center; gap: 14px; }
  .countdown-unit { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .countdown-num { font-family: 'Cormorant Garant', serif; font-size: 30px; font-weight: 600; color: var(--gold); line-height: 1; }
  .countdown-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--slate); }
  .countdown-sep { font-family: 'Cormorant Garant', serif; font-size: 26px; color: var(--navy-light); align-self: flex-start; margin-top: 2px; }

  /* PROGRESS */
  .progress-wrap { position: sticky; top: 0; z-index: 95; background: var(--ivory-dark); padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .progress-bar-outer { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--rose), var(--gold)); border-radius: 3px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  /* FILTER STICKY */
  .filter-sticky { position: sticky; top: var(--progress-h, 0px); background: var(--ivory); padding: 8px 16px 6px; z-index: 90; border-bottom: 1px solid var(--border); }
  .filter-sticky .filter-row { margin-bottom: 6px; padding: 0; }
  .filter-sticky .filter-row:last-child { margin-bottom: 2px; }
  .main { padding: 14px 14px 100px; max-width: 600px; margin: 0 auto; }

  /* FILTERS */
  .filter-row { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { background: var(--ivory-dark); border: 1.5px solid var(--border); border-radius: 20px; padding: 0 13px; height: 34px; line-height: 1; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; }
  .filter-row-status { overflow: visible; }
  .filter-row-status .filter-chip { flex: 1; text-align: center; padding: 6px 4px; }
  .filter-chip.active { background: var(--navy); border-color: var(--navy); color: white; }
  .filter-chip.tapped { background: var(--rose); border-color: var(--rose); color: white; transform: scale(0.93); transition: transform 0.1s ease, background 0.1s ease; }
  .filter-row-status .filter-chip-trash { flex: 0 0 42px; font-size: 15px; }
  .task-card.deleted-card { border-color: var(--rose); opacity: 0.7; }
  .task-delete-perm { background: var(--rose); color: white; border: none; border-radius: 8px; padding: 6px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; flex-shrink: 0; }
  .scroll-fade-wrap { position: relative; }
  .scroll-fade-wrap::before, .scroll-fade-wrap::after { content: ''; position: absolute; top: 0; bottom: 0; width: 28px; pointer-events: none; z-index: 2; transition: opacity 0.2s; }
  .scroll-fade-wrap::before { left: 0; background: linear-gradient(to right, var(--ivory), transparent); opacity: 0; }
  .scroll-fade-wrap::after { right: 0; background: linear-gradient(to left, var(--ivory), transparent); opacity: 1; }
  .scroll-fade-wrap.at-start::before { opacity: 0; }
  .scroll-fade-wrap.at-end::after { opacity: 0; }
  .scroll-fade-wrap.scrollable::before { opacity: 1; }

  /* CATEGORY GROUP */
  .category-group { margin-bottom: 18px; }
  .category-header { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; position: sticky; top: var(--section-top, 0px); background: var(--ivory); z-index: 80; margin-left: -14px; margin-right: -14px; padding: 6px 16px; }
  .category-icon { font-size: 15px; }
  .category-name { font-family: 'Cormorant Garant', serif; font-size: 18px; font-weight: 600; color: var(--text); font-style: italic; flex: 1; }
  .category-count { font-size: 11px; color: var(--text-muted); background: var(--ivory-dark); padding: 2px 8px; border-radius: 10px; }

  /* TASK CARD */
  .task-card { background: var(--surface); border-radius: 12px; padding: 12px 14px; margin-bottom: 7px; border: 1px solid var(--border); display: flex; align-items: flex-start; gap: 11px; box-shadow: 0 1px 3px rgba(61,10,26,0.07); transition: opacity 0.2s; cursor: pointer; }
  .task-card.done { opacity: 0.5; }
  .task-card.done .task-text { text-decoration: line-through; }
  .task-checkbox { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: border-color 0.15s, background 0.15s; }
  .task-checkbox.checked { background: var(--rose); border-color: var(--rose); }
  .task-checkbox.checked::after { content: ''; width: 5px; height: 9px; border-right: 2px solid white; border-bottom: 2px solid white; transform: rotate(40deg) translateY(-2px); display: block; }
  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 14px; line-height: 1.4; color: var(--text); word-break: break-word; }
  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .task-due { font-size: 11px; color: var(--text-muted); }
  .task-due.overdue { color: var(--rose); font-weight: 600; }
  .task-completed { font-size: 11px; color: var(--green); }
  .task-owner { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
  .owner-lexi { background: #f5e0e8; color: #7A2040; }
  .owner-eddy { background: #e8dff0; color: #4A2060; }
  .owner-both { background: #e8e0d5; color: #5C3A20; }
  .task-details { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-style: italic; line-height: 1.4; }
  .task-delete { background: none; border: none; cursor: pointer; color: var(--border); font-size: 18px; padding: 0 2px; line-height: 1; flex-shrink: 0; transition: color 0.15s; }
  .task-delete:hover { color: var(--rose); }

  /* EMPTY / LOADING */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-state-icon { font-size: 32px; margin-bottom: 8px; }
  .empty-state p { font-family: 'Cormorant Garant', serif; font-style: italic; font-size: 17px; }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-style: italic; font-family: 'Cormorant Garant', serif; font-size: 18px; }

  /* SEED BANNER */
  .seed-banner { background: #fdf0e8; border: 1px solid var(--gold); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; font-size: 13px; color: #7A4020; display: flex; align-items: center; gap: 10px; }
  .seed-banner button { margin-left: auto; background: var(--gold); color: #3D0A1A; border: none; border-radius: 7px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy); color: white; padding: 10px 20px; border-radius: 24px; font-size: 13px; pointer-events: none; transition: transform 0.25s ease; z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* FAB */
  .fab { position: fixed; bottom: 28px; right: 22px; width: 56px; height: 56px; border-radius: 50%; background: var(--rose); color: white; font-size: 30px; border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(61,10,26,0.3); z-index: 400; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background 0.15s; }
  .fab:active { transform: scale(0.92); background: var(--rose-dark); }

  /* SETTINGS BTN */
  .settings-btn { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.5; padding: 4px; line-height: 1; transition: opacity 0.15s; }
  .settings-btn:hover { opacity: 0.9; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(61,10,26,0.55); z-index: 500; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: var(--ivory); border-radius: 20px 20px 0 0; padding: 18px 18px 34px; width: 100%; max-width: 600px; margin: 0 auto; box-shadow: 0 -4px 24px rgba(61,10,26,0.2); transition: transform 0.25s ease; touch-action: none; max-height: 90vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
  .modal-title { font-family: 'Cormorant Garant', serif; font-size: 20px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
  .modal-input { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 13px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--surface); outline: none; margin-bottom: 9px; }
  .modal-input:focus { border-color: var(--rose); }
  textarea.modal-input { resize: vertical; min-height: 60px; }
  .modal-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .modal-select { flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 11px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--surface); outline: none; appearance: none; -webkit-appearance: none; color: var(--text); }
  input[type="date"].modal-select { min-height: 42px; -webkit-appearance: none; appearance: none; display: block; width: 100%; color: var(--text); padding: 9px 11px; }
  input[type="date"].modal-select::-webkit-date-and-time-value { text-align: left; min-height: 22px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn-save { flex: 1; background: var(--rose); color: white; border: none; border-radius: 10px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-cancel { background: var(--ivory-dark); color: var(--text-muted); border: none; border-radius: 10px; padding: 13px 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; cursor: pointer; }
  .modal-label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; }

  /* CATEGORY MANAGER */
  .cat-list { margin-bottom: 16px; }
  .cat-item { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 7px; }
  .cat-item-icon { font-size: 18px; width: 28px; text-align: center; cursor: pointer; }
  .cat-item-name { flex: 1; font-size: 14px; color: var(--text); }
  .cat-item-edit { background: none; border: none; font-size: 13px; color: var(--text-muted); cursor: pointer; padding: 4px 8px; border-radius: 6px; }
  .cat-item-edit:hover { background: var(--ivory-dark); }
  .cat-item-delete { background: none; border: none; font-size: 16px; color: var(--border); cursor: pointer; padding: 2px 4px; }
  .cat-item-delete:hover { color: var(--rose); }
  .add-cat-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .add-cat-icon { width: 48px; border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 4px; font-size: 18px; text-align: center; background: var(--surface); outline: none; }
  .add-cat-name { flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--surface); outline: none; color: var(--text); }
  .add-cat-name:focus, .add-cat-icon:focus { border-color: var(--rose); }
  .add-cat-btn { background: var(--rose); color: white; border: none; border-radius: 10px; padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
</style>
</head>
<body>

<div class="hero">
  <button class="settings-btn" onclick="openManage()" title="Manage categories">⚙️</button>
  <div class="hero-eyebrow">Lexi & Eddy · Getting Married</div>
  <div class="hero-title">January 30, 2027 ✦</div>
  <div class="countdown">
    <div class="countdown-unit"><span class="countdown-num" id="cd-days">—</span><span class="countdown-label">days</span></div>
    <div class="countdown-sep">·</div>
    <div class="countdown-unit"><span class="countdown-num" id="cd-hours">—</span><span class="countdown-label">hours</span></div>
    <div class="countdown-sep">·</div>
    <div class="countdown-unit"><span class="countdown-num" id="cd-mins">—</span><span class="countdown-label">mins</span></div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar" style="width:0%"></div></div>
  <div class="progress-label" id="progress-label">0 / 0 done</div>
</div>

<div class="filter-sticky">
  <div class="filter-row filter-row-status">
    <div class="filter-chip active" onclick="setFilter('all',this)">All</div>
    <div class="filter-chip" onclick="setFilter('todo',this)">To Do</div>
    <div class="filter-chip" onclick="setFilter('done',this)">Done</div>
    <div class="filter-chip" onclick="setFilter('lexi',this)">Lexi</div>
    <div class="filter-chip" onclick="setFilter('eddy',this)">Eddy</div>
    <div class="filter-chip filter-chip-trash" onclick="setFilter('deleted',this)" title="Deleted items">🗑️</div>
  </div>
  <div class="scroll-fade-wrap">
    <div class="filter-row" id="category-nav"></div>
  </div>
</div>

<div class="main">
  <div id="seed-banner" class="seed-banner" style="display:none">
    🌸 Import your existing tasks?
    <button onclick="seedTasks()">Import Now</button>
  </div>
  <div id="task-list"><div class="loading">Loading your list…</div></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAdd()" title="Add task">+</button>

<!-- Add Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">New Task</div>
    <input type="text" class="modal-input" id="add-text" placeholder="Task name" maxlength="200">
    <textarea class="modal-input" id="add-details" placeholder="Notes (optional)" rows="2"></textarea>
    <div class="modal-row">
      <select class="modal-select" id="add-category"></select>
      <select class="modal-select" id="add-owner">
        <option value="">No owner</option>
        <option value="Lexi">Lexi</option>
        <option value="Eddy">Eddy</option>
        <option value="Lexi+Eddy">Both</option>
      </select>
    </div>
    <div class="modal-row">
      <div style="flex:1">
        <label class="modal-label">Due Date</label>
        <input type="date" class="modal-select" id="add-due" style="width:100%">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAdd()">Cancel</button>
      <button class="btn-save" onclick="addTask()">Add Task</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Task</div>
    <input type="text" class="modal-input" id="edit-text" maxlength="200">
    <textarea class="modal-input" id="edit-details" placeholder="Notes / details (optional)" rows="2"></textarea>
    <div class="modal-row">
      <select class="modal-select" id="edit-category"></select>
      <select class="modal-select" id="edit-owner">
        <option value="">No owner</option>
        <option value="Lexi">Lexi</option>
        <option value="Eddy">Eddy</option>
        <option value="Lexi+Eddy">Both</option>
      </select>
    </div>
    <div class="modal-row">
      <div style="flex:1">
        <label class="modal-label">Due Date</label>
        <input type="date" class="modal-select" id="edit-due" style="width:100%">
      </div>
      <div style="flex:1">
        <label class="modal-label">Date Completed</label>
        <input type="date" class="modal-select" id="edit-completed" style="width:100%">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Manage Categories Modal -->
<div class="modal-overlay" id="manage-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Manage Categories</div>
    <div class="cat-list" id="cat-list"></div>
    <div class="add-cat-row">
      <input type="text" class="add-cat-icon" id="new-cat-icon" placeholder="📋" maxlength="2">
      <input type="text" class="add-cat-name" id="new-cat-name" placeholder="New category name…" maxlength="60">
      <button class="add-cat-btn" onclick="addCategory()">Add</button>
    </div>
    <div class="modal-actions" style="margin-top:10px">
      <button class="btn-cancel" onclick="closeManage()">Done</button>
    </div>
  </div>
</div>

<!-- Edit Category Modal -->
<div class="modal-overlay" id="edit-cat-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Category</div>
    <div class="modal-row">
      <input type="text" class="modal-select" id="edit-cat-icon" placeholder="📋" maxlength="2" style="flex:0 0 60px; text-align:center; font-size:20px;">
      <input type="text" class="modal-select" id="edit-cat-name" placeholder="Category name" maxlength="60" style="flex:1">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditCat()">Cancel</button>
      <button class="btn-save" onclick="saveEditCat()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  // ── REPLACE WITH YOUR FIREBASE CONFIG ──
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const USE_LOCAL = firebaseConfig.apiKey === "YOUR_API_KEY";

  let db, tasksRef, catsRef, addDoc, updateDoc, deleteDoc, doc, serverTimestamp,
      writeBatch, onSnapshot, query, orderBy, collection, getDocs, setDoc, getDoc;

  if (!USE_LOCAL) {
    const fb = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const fs = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const app = fb.initializeApp(firebaseConfig);
    db = fs.getFirestore(app);
    ({ addDoc, updateDoc, deleteDoc, doc, serverTimestamp, writeBatch,
       onSnapshot, query, orderBy, collection, getDocs, setDoc, getDoc } = fs);
    tasksRef = collection(db, "wedding/tasks/items");
    catsRef  = collection(db, "wedding/config/categories");
  }

  // ── LOCAL HELPERS ──
  const LS_TASKS = 'wedding_tasks_local';
  const LS_CATS  = 'wedding_cats_local';
  function lsLoadTasks() { try { return JSON.parse(localStorage.getItem(LS_TASKS)) || []; } catch { return []; } }
  function lsSaveTasks(t) { localStorage.setItem(LS_TASKS, JSON.stringify(t)); }
  function lsLoadCats()  { try { return JSON.parse(localStorage.getItem(LS_CATS))  || []; } catch { return []; } }
  function lsSaveCats(c) { localStorage.setItem(LS_CATS, JSON.stringify(c)); }

  let allTasks = [];
  let allCategories = []; // [{ id, name, icon, order }]
  let currentFilter = 'all';
  let editingId = null;
  let editingCatId = null;

  // ── DEFAULT CATEGORIES (used for first-time seed) ──
  const DEFAULT_CATS = [
    { name: "Big Picture",                          icon: "🌟", order: 1  },
    { name: "Wedding Party",                        icon: "💒", order: 2  },
    { name: "Lexi Bachelorette Party",              icon: "🥂", order: 3  },
    { name: "Eddy Bachelor Party",                  icon: "🍻", order: 4  },
    { name: "Hotel Block Prep",                     icon: "🏨", order: 5  },
    { name: "St. Agnes Prep Steps",                 icon: "⛪", order: 6  },
    { name: "Rusty Pelican Prep Steps",             icon: "🍽️", order: 7  },
    { name: "Transportation Prep",                  icon: "🚌", order: 8  },
    { name: "DJ Prep",                              icon: "🎶", order: 9  },
    { name: "After Party Prep",                     icon: "🎉", order: 10 },
    { name: "January 29th, 2027 — Rehearsal Dinner!", icon: "🕯️", order: 11 },
    { name: "January 30th, 2027 — Wedding Day!",    icon: "💍", order: 12 },
  ];

  // ── SEED TASKS ──
  const SEED_TASKS = [
    {text:"Choose Venue",category:"Big Picture",done:true,due:null,completed:"2025-12-01",owner:"Lexi+Eddy",details:"Rusty Pelican"},
    {text:"Choose Date",category:"Big Picture",done:true,due:null,completed:"2025-12-01",owner:"Lexi+Eddy",details:"January 30th, 2027"},

  // ── CATEGORY MIGRATION ──
  // Finds tasks whose category doesn't match any known category and tries to auto-fix.
  // Matching logic: case-insensitive substring match in either direction.
  async function migrateMismatchedCategories() {
    const knownNames = allCategories.map(c => c.name);
    const mismatched = allTasks.filter(t =>
      t.category !== '__deleted__' && !knownNames.includes(t.category)
    );
    if (mismatched.length === 0) return;

    const batch = writeBatch(db);
    let fixed = 0;
    mismatched.forEach(t => {
      const tCat = t.category?.toLowerCase() || '';
      // Try to find a category that contains or is contained by the task's category
      const match = allCategories.find(c => {
        const cName = c.name.toLowerCase();
        return cName.includes(tCat) || tCat.includes(cName);
      });
      if (match) {
        batch.update(doc(db, 'wedding/tasks/items', t.id), { category: match.name });
        fixed++;
      }
    });
    if (fixed > 0) {
      await batch.commit();
      console.log(`Migrated ${fixed} task(s) to matching categories`);
    }
    // Any still unmatched after this will just not appear — user can fix via edit
  }

  // ── INIT: LOAD CATEGORIES THEN TASKS ──
  async function init() {
    if (USE_LOCAL) {
      let cats = lsLoadCats();
      if (cats.length === 0) {
        cats = DEFAULT_CATS.map((c, i) => ({ ...c, id: 'lcat_' + i }));
        lsSaveCats(cats);
      }
      allCategories = cats;
      renderCatManager();
      const tasks = lsLoadTasks();
      allTasks = tasks;
      document.getElementById('seed-banner').style.display = USE_LOCAL && tasks.length === 0 ? 'flex' : 'none';
      render();
    } else {
      // Load categories first
      const catSnap = await getDocs(query(catsRef, orderBy('order', 'asc')));
      if (catSnap.empty) {
        // First time — seed categories
        const batch = writeBatch(db);
        DEFAULT_CATS.forEach(c => {
          const ref = doc(catsRef);
          batch.set(ref, c);
        });
        await batch.commit();
        // Re-fetch
        const snap2 = await getDocs(query(catsRef, orderBy('order', 'asc')));
        allCategories = snap2.docs.map(d => ({ id: d.id, ...d.data() }));
      } else {
        allCategories = catSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      }
      renderCatManager();

      // Live listen to categories
      onSnapshot(query(catsRef, orderBy('order', 'asc')), snap => {
        allCategories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderCatManager();
        render();
      });

      // Live listen to tasks
      onSnapshot(query(tasksRef, orderBy('createdAt', 'asc')), async snap => {
        allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        document.getElementById('seed-banner').style.display = 'none';
        await migrateMismatchedCategories();
        render();
      });
    }
  }
  init();

  // ── RENDER TASKS ──
  function render() {
    const today = new Date(); today.setHours(0,0,0,0);
    const filtered = allTasks.filter(t => {
      if (currentFilter === 'deleted') return t.category === '__deleted__';
      if (t.category === '__deleted__') return false; // exclude from all other filters
      if (currentFilter === 'done')  return t.done;
      if (currentFilter === 'todo')  return !t.done;
      if (currentFilter === 'lexi')  return !t.done && t.owner && t.owner.toLowerCase().includes('lexi');
      if (currentFilter === 'eddy')  return !t.done && t.owner && t.owner.toLowerCase().includes('eddy');
      return true;
    });

    const total = allTasks.filter(t => t.category !== '__deleted__').length;
    const done  = allTasks.filter(t => t.done && t.category !== '__deleted__').length;
    const pct   = total ? Math.round(done/total*100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `${done} / ${total} done`;

    const container = document.getElementById('task-list');
    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">${total===0?'💍':'✅'}</div><p>${total===0?'Import or add your first task!':'Nothing here.'}</p></div>`;
    } else {
      // Group by category
      const groups = {};
      allCategories.forEach(c => groups[c.name] = []);
      filtered.forEach(t => {
        const cat = t.category || 'Other';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(t);
      });

      // Sort within each group
      function sortTasks(tasks) {
        const done = tasks.filter(t=>t.done).sort((a,b) => {
          if (!a.completed && !b.completed) return 0;
          if (!a.completed) return -1;
          if (!b.completed) return 1;
          return a.completed.localeCompare(b.completed);
        });
        const todo = tasks.filter(t=>!t.done).sort((a,b) => {
          if (!a.due && !b.due) return 0;
          if (!a.due) return 1;
          if (!b.due) return -1;
          return a.due.localeCompare(b.due);
        });
        return [...done, ...todo];
      }

      let html = '';
      // Handle deleted filter — show as one flat list
      if (currentFilter === 'deleted') {
        if (filtered.length === 0) {
          html = '<div class="empty-state"><div class="empty-state-icon">🗑️</div><p>Nothing deleted.</p></div>';
        } else {
          html += `<div class="category-group"><div class="category-header"><span class="category-icon">🗑️</span><span class="category-name">Deleted</span><span class="category-count">${filtered.length}</span></div>`;
          filtered.forEach(t => {
            html += `<div class="task-card deleted-card">
              <div class="task-body">
                <div class="task-text">${escHtml(t.text)}</div>
                ${t.details ? `<div class="task-details">${escHtml(t.details)}</div>` : ''}
              </div>
              <button class="btn-cancel" style="font-size:12px;padding:6px 10px;flex-shrink:0;" onclick="restoreTask('${t.id}')">Restore</button>
              <button class="task-delete-perm" onclick="permanentDelete('${t.id}','${escHtml(t.text)}')">Delete</button>
            </div>`;
          });
          html += '</div>';
        }
        container.innerHTML = html;
      } else {

      for (const cat of allCategories) {
        const tasks = sortTasks(groups[cat.name] || []);
        if (!tasks.length) continue;
        const remaining = tasks.filter(t=>!t.done).length;
        const catId = 'cat-' + cat.name.replace(/[^a-zA-Z0-9]/g,'-');
        html += `<div class="category-group" id="${catId}">
          <div class="category-header">
            <span class="category-icon">${cat.icon}</span>
            <span class="category-name">${escHtml(cat.name)}</span>
            <span class="category-count">${remaining > 0 ? remaining+' left' : '✓ done'}</span>
          </div>`;
        tasks.forEach(t => {
          const isDeleted = t.category === '__deleted__';
          let metaHtml = '';
          if (t.due) {
            const d = new Date(t.due+'T00:00:00');
            const isOverdue = !t.done && d < today;
            const label = d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
            metaHtml += `<span class="task-due${isOverdue?' overdue':''}">${isOverdue?'⚠️ ':'📅 '}Due ${label}</span>`;
          }
          if (t.completed) {
            const c = new Date(t.completed+'T00:00:00');
            metaHtml += `<span class="task-completed">✅ Completed ${c.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>`;
          }
          if (t.owner) {
            const o = t.owner.toLowerCase();
            const cls = o.includes('lexi') && o.includes('eddy') ? 'owner-both' : o.includes('lexi') ? 'owner-lexi' : 'owner-eddy';
            const label = (o.includes('lexi') && o.includes('eddy')) ? 'Both' : t.owner.replace('Lexi + Eddy','Both').replace('Lexi+Eddy','Both');
            metaHtml += `<span class="task-owner ${cls}">${label}</span>`;
          }
          if (isDeleted) {
            html += `<div class="task-card deleted-card">
              <div class="task-body">
                <div class="task-text">${escHtml(t.text)}</div>
                ${metaHtml ? `<div class="task-meta">${metaHtml}</div>` : ''}
                ${t.details ? `<div class="task-details">${escHtml(t.details)}</div>` : ''}
              </div>
              <button class="btn-cancel" style="font-size:12px;padding:6px 10px;flex-shrink:0;" onclick="restoreTask('${t.id}')">Restore</button>
              <button class="task-delete-perm" onclick="permanentDelete('${t.id}','${escHtml(t.text)}')">Delete</button>
            </div>`;
          } else {
            html += `<div class="task-card${t.done?' done':''}" onclick="openEdit('${t.id}')">
              <div class="task-checkbox${t.done?' checked':''}" onclick="event.stopPropagation();toggleTask('${t.id}',${t.done})"></div>
              <div class="task-body">
                <div class="task-text">${escHtml(t.text)}</div>
                ${metaHtml ? `<div class="task-meta">${metaHtml}</div>` : ''}
                ${t.details ? `<div class="task-details">${escHtml(t.details)}</div>` : ''}
              </div>
              <button class="task-delete" onclick="event.stopPropagation();deleteTask('${t.id}')" title="Delete">×</button>
            </div>`;
          }
        });
        html += '</div>';
      }
      container.innerHTML = html;
      } // end else (non-deleted)
    }

    // Rebuild category nav chips
    const nav = document.getElementById('category-nav');
    nav.innerHTML = '';
    const groups2 = {};
    filtered.forEach(t => { const c = t.category||'Other'; groups2[c] = true; });
    allCategories.forEach(cat => {
      if (!groups2[cat.name]) return;
      const chip = document.createElement('div');
      chip.className = 'filter-chip cat-nav-chip';
      chip.textContent = cat.icon + ' ' + cat.name;
      chip.onclick = () => {
        chip.classList.add('tapped');
        setTimeout(() => chip.classList.remove('tapped'), 300);
        const el = document.getElementById('cat-' + cat.name.replace(/[^a-zA-Z0-9]/g,'-'));
        if (el) {
          const progressH = document.querySelector('.progress-wrap').offsetHeight;
          const filterH   = document.querySelector('.filter-sticky').offsetHeight;
          const offset    = progressH + filterH + 8;
          window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - offset, behavior: 'smooth' });
        }
      };
      nav.appendChild(chip);
    });

    // Scroll fade
    const navEl = document.getElementById('category-nav');
    const wrap  = navEl.parentElement;
    function updateFade() {
      wrap.classList.toggle('at-start',  navEl.scrollLeft <= 2);
      wrap.classList.toggle('at-end',    navEl.scrollLeft >= navEl.scrollWidth - navEl.clientWidth - 2);
      wrap.classList.toggle('scrollable',navEl.scrollLeft > 2);
    }
    navEl.removeEventListener('scroll', updateFade);
    navEl.addEventListener('scroll', updateFade, { passive: true });
    setTimeout(updateFade, 50);

    setStickyTop();
  }

    if (!name) return;
    const order = allCategories.length ? Math.max(...allCategories.map(c=>c.order)) + 1 : 1;

      cats.push({ id: 'lcat_'+Date.now(), name, icon, order });

    if (USE_LOCAL) {
      lsSaveCats(lsLoadCats().filter(c => c.id !== id));
      allCategories = lsLoadCats();
      renderCatManager();
      render();
    } else {
      await deleteDoc(doc(db, 'wedding/config/categories', id));
    }

  window.openEditCat = function(id) {
    const cat = allCategories.find(c => c.id === id);
    if (!cat) return;
    editingCatId = id;
    document.getElementById('edit-cat-icon').value = cat.icon;
    document.getElementById('edit-cat-name').value = cat.name;
    document.getElementById('edit-cat-modal').classList.add('open');
  };
  window.closeEditCat = function() {
    editingCatId = null;
    document.getElementById('edit-cat-modal').classList.remove('open');
  };
  window.saveEditCat = async function() {
    if (!editingCatId) return;
    const icon = document.getElementById('edit-cat-icon').value.trim() || '📋';
    const name = document.getElementById('edit-cat-name').value.trim();
    if (!name) return;
    const oldCat = allCategories.find(c => c.id === editingCatId);
    const oldName = oldCat?.name;
    if (USE_LOCAL) {
      // Update category
      const cats = lsLoadCats().map(c => c.id === editingCatId ? { ...c, name, icon } : c);
      lsSaveCats(cats);
      allCategories = cats;
      // Update all tasks with old category name
      if (oldName && oldName !== name) {
        const tasks = lsLoadTasks().map(t => t.category === oldName ? { ...t, category: name } : t);
        lsSaveTasks(tasks);
        allTasks = tasks;
      }
      renderCatManager();
      render();
    } else {
      // Update category doc
      await updateDoc(doc(db, 'wedding/config/categories', editingCatId), { name, icon });
      // Batch update all tasks with the old category name
      if (oldName && oldName !== name) {
        const affectedTasks = allTasks.filter(t => t.category === oldName);
        if (affectedTasks.length > 0) {
          const batch = writeBatch(db);
          affectedTasks.forEach(t => {
            batch.update(doc(db, 'wedding/tasks/items', t.id), { category: name });
          });
          await batch.commit();
        }
      }
    }
    closeEditCat();
    showToast('Category updated');
  };

  };

  window.restoreTask = async function(id) {
    const updates = { category: allCategories[0]?.name || 'Other' };
    if (USE_LOCAL) {
      const tasks = lsLoadTasks().map(t => t.id === id ? { ...t, ...updates } : t);
      lsSaveTasks(tasks); allTasks = tasks; render();
    } else {
      await updateDoc(doc(db,'wedding/tasks/items',id), updates);
    }
    showToast('Task restored');
  };

  window.permanentDelete = async function(id, name) {
    if (!confirm(`Permanently delete "${name}"? This cannot be undone.`)) return;
    if (USE_LOCAL) {
      const tasks = lsLoadTasks().filter(t => t.id !== id);
      lsSaveTasks(tasks); allTasks = tasks; render();
    } else {
      await deleteDoc(doc(db,'wedding/tasks/items',id));
    }
    showToast('Permanently deleted');
  };

  window.seedTasks = async function() {
    document.getElementById('seed-banner').innerHTML = '<span>Importing tasks…</span>';
    if (USE_LOCAL) {
      const tasks = SEED_TASKS.map((t,i) => ({ ...t, id:'local_'+(Date.now()+i), createdAt: Date.now()+i }));
      lsSaveTasks(tasks); allTasks = tasks; render();
    } else {
      const batch = writeBatch(db);
      const t = Date.now();
      SEED_TASKS.forEach((task, i) => {
        const ref = doc(tasksRef);
        batch.set(ref, { ...task, createdAt: { seconds: Math.floor((t+i*100)/1000), nanoseconds: 0 } });
      });
      await batch.commit();
    }
    showToast('Tasks imported! 🎉');
  };

  window.openEdit = function(id) {
    const t = allTasks.find(x => x.id === id);
    if (!t) return;
    editingId = id;
    buildCategoryOptions('edit-category', t.category);
    document.getElementById('edit-text').value      = t.text;
    document.getElementById('edit-details').value   = t.details || '';
    document.getElementById('edit-owner').value     = t.owner || '';
    document.getElementById('edit-due').value       = t.due || '';
    document.getElementById('edit-completed').value = t.completed || '';
    document.getElementById('edit-modal').classList.add('open');
  };
  window.closeEdit = function() { editingId = null; document.getElementById('edit-modal').classList.remove('open'); };

  window.saveEdit = async function() {
    if (!editingId) return;
    const text = document.getElementById('edit-text').value.trim();
    if (!text) return;
    const updates = {
      text,
      details:   document.getElementById('edit-details').value.trim() || null,
      category:  document.getElementById('edit-category').value,
      owner:     document.getElementById('edit-owner').value || null,
      due:       document.getElementById('edit-due').value || null,
      completed: document.getElementById('edit-completed').value || null,
    };
    if (USE_LOCAL) {
      const tasks = lsLoadTasks().map(t => t.id === editingId ? { ...t, ...updates } : t);
      lsSaveTasks(tasks); allTasks = tasks; render();
    } else {
      await updateDoc(doc(db,'wedding/tasks/items',editingId), updates);
    }
    closeEdit();
    showToast('Saved');
  };

  // ── SWIPE TO CLOSE ALL MODALS ──
  document.querySelectorAll('.modal-sheet').forEach(sheet => {
    let startY = 0, currentY = 0, dragging = false;
    sheet.addEventListener('touchstart', e => {
      if (e.target.closest('.modal-handle') || e.touches[0].clientY - sheet.getBoundingClientRect().top < 40) {
        startY = e.touches[0].clientY; dragging = true; sheet.style.transition = 'none';
      }
    }, { passive: true });
    sheet.addEventListener('touchmove', e => {
      if (!dragging) return;
      currentY = e.touches[0].clientY;
      sheet.style.transform = `translateY(${Math.max(0, currentY - startY)}px)`;
    }, { passive: true });
    sheet.addEventListener('touchend', () => {
      if (!dragging) return;
      dragging = false;
      sheet.style.transition = 'transform 0.25s ease';
      if (currentY - startY > 80) {
        sheet.style.transform = 'translateY(100%)';
        const id = sheet.closest('.modal-overlay').id;
        setTimeout(() => {
          sheet.style.transform = '';
          if (id === 'add-modal') closeAdd();
          else if (id === 'edit-modal') closeEdit();
          else if (id === 'manage-modal') closeManage();
          else if (id === 'edit-cat-modal') closeEditCat();
        }, 250);
      } else { sheet.style.transform = ''; }
    });
  });

  ['edit-modal','add-modal','manage-modal','edit-cat-modal'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e) {
      if (e.target === this) {
        if (id === 'add-modal') closeAdd();
        else if (id === 'edit-modal') closeEdit();
        else if (id === 'manage-modal') closeManage();
        else if (id === 'edit-cat-modal') closeEditCat();
      }
    });
  });

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
